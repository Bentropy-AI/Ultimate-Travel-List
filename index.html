<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ultimate TravelList</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        header {
            background: #007BFF;
            color: #fff;
            padding: 20px;
            text-align: center;
        }
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            padding: 20px;
        }
        .card {
            background: white;
            border: 1px solid #ddd;
            border-radius: 5px;
            width: 200px;
            margin: 10px;
            padding: 15px;
            text-align: center;
        }
        .card h3 {
            margin: 10px 0;
        }
        .progress {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
        }
        .button {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }
        .search-icon {
            cursor: pointer;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <header>
        <h1><i class="plane icon"></i> The Ultimate TravelList</h1>
        <button class="button">Launch Dashboard</button>
        <span class="search-icon">🔍</span>
    </header>
    <div class="container">
        <div class="card">
            <h3>Ultimate Travel</h3>
            <div class="progress">
                <div>Paul: 224</div>
                <div>Ruth: 225</div>
                <div>Ben: 267</div>
                <div>Shaz: 259</div>
            </div>
        </div>
        <div class="card">
            <h3>Ultimate Travel List</h3>
            <div class="progress">
                <div>Paul: 170</div>
                <div>Ruth: 172</div>
                <div>Ben: 289</div>
                <div>Shaz: 204</div>
            </div>
        </div>
        <div class="card">
            <h3>Ultimate Country List</h3>
            <div class="progress">
                <div>Paul: 65</div>
                <div>Ruth: 62</div>
                <div>Ben: 95</div>
                <div>Shaz: 94</div>
            </div>
        </div>
        <div class="card">
            <h3>Animal Checklist</h3>
            <div class="progress">
                <div>Paul: 61</div>
                <div>Ruth: 61</div>
                <div>Ben: 45</div>
                <div>Shaz: 44</div>
            </div>
        </div>
    </div>
</body>
</html>
